<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Overdrive | Arcade Racer</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff007f;
            --neon-yellow: #f4ea17;
            --bg-dark: #0a0a12;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: #111;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
        }

        /* UI Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10;
            transition: opacity 0.3s;
        }

        .hidden { display: none !important; }

        /* HUD */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 5;
            text-shadow: 0 0 5px #000;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
        }

        .label { font-size: 10px; color: var(--neon-blue); text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 20px; font-weight: bold; }

        /* Menu Styles */
        h1 {
            font-size: 3rem;
            margin: 0;
            color: var(--neon-blue);
            text-shadow: 0 0 20px var(--neon-blue);
            font-style: italic;
        }

        .btn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 1.2rem;
            background: transparent;
            color: white;
            border: 2px solid var(--neon-pink);
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            font-weight: bold;
            box-shadow: 0 0 10px var(--neon-pink);
        }

        .btn:hover {
            background: var(--neon-pink);
            box-shadow: 0 0 25px var(--neon-pink);
        }

        /* Mobile Controls */
        #controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 20px;
            z-index: 8;
        }

        .ctrl-btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .ctrl-btn:active {
            background: rgba(0, 242, 255, 0.3);
            border-color: var(--neon-blue);
        }

        #nitro-btn {
            border-color: var(--neon-yellow);
            color: var(--neon-yellow);
        }

        #nitro-btn:active {
            background: rgba(244, 234, 23, 0.3);
        }

        .score-list { text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div class="stat-box">
            <span class="label">Score</span>
            <span id="score-val" class="value">0</span>
        </div>
        <div class="stat-box" style="align-items: center;">
            <span class="label">Speed</span>
            <span id="speed-val" class="value">0</span>
        </div>
        <div class="stat-box" style="align-items: flex-end;">
            <span class="label">Coins</span>
            <span id="coins-val" class="value" style="color: var(--neon-yellow);">0</span>
        </div>
    </div>

    <div id="start-screen" class="overlay">
        <h1>NEON DRIVE</h1>
        <p style="color: var(--neon-blue)">AVOID TRAFFIC. COLLECT COINS.</p>
        <div class="score-list">
            <span class="label">Best Score: </span><span id="best-score">0</span>
        </div>
        <button class="btn" onclick="game.start()">Start Engine</button>
    </div>

    <div id="game-over" class="overlay hidden">
        <h1 style="color: var(--neon-pink); text-shadow: 0 0 20px var(--neon-pink);">CRASHED!</h1>
        <div class="score-list">
            <div class="value" id="final-score">0</div>
            <span class="label">Final Score</span>
        </div>
        <button class="btn" onclick="game.start()">Restart</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="controls">
        <div class="ctrl-btn" id="btn-left">◀</div>
        <div class="ctrl-btn" id="nitro-btn">N2O</div>
        <div class="ctrl-btn" id="btn-right">▶</div>
    </div>
</div>

<script>
/** * AUDIO SYSTEM - Procedural Synthesis 
 */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    switch(type) {
        case 'coin':
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
            break;
        case 'nitro':
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
            break;
        case 'crash':
            osc.type = 'square';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
            break;
    }
}

/**
 * GAME CORE
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const game = {
    active: false,
    score: 0,
    coins: 0,
    bestScore: localStorage.getItem('neonBest') || 0,
    speed: 5,
    level: 1,
    width: 0,
    height: 0,
    roadWidth: 0,
    laneWidth: 0,
    shake: 0,
    
    init() {
        this.resize();
        window.addEventListener('resize', () => this.resize());
        document.getElementById('best-score').innerText = this.bestScore;
        this.loop();
    },

    resize() {
        this.width = canvas.width = window.innerWidth > 450 ? 450 : window.innerWidth;
        this.height = canvas.height = window.innerHeight;
        this.roadWidth = this.width * 0.85;
        this.laneWidth = this.roadWidth / 3;
    },

    start() {
        this.active = true;
        this.score = 0;
        this.coins = 0;
        this.speed = 6;
        this.level = 1;
        player.x = this.width / 2;
        player.y = this.height - 120;
        enemies = [];
        collectibles = [];
        particles = [];
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-over').classList.add('hidden');
    },

    gameOver() {
        this.active = false;
        this.shake = 20;
        playSound('crash');
        if (this.score > this.bestScore) {
            this.bestScore = Math.floor(this.score);
            localStorage.setItem('neonBest', this.bestScore);
        }
        document.getElementById('final-score').innerText = Math.floor(this.score);
        document.getElementById('game-over').classList.remove('hidden');
    },

    update() {
        if (!this.active) return;
        
        this.score += 0.1;
        this.speed = 7 + (this.score / 500);
        this.level = Math.min(4, Math.floor(this.score / 1000) + 1);

        if (this.shake > 0) this.shake *= 0.9;

        // HUD Update
        document.getElementById('score-val').innerText = Math.floor(this.score);
        document.getElementById('speed-val').innerText = Math.floor(this.speed * 10) + " km/h";
        document.getElementById('coins-val').innerText = this.coins;
    },

    loop() {
        ctx.clearRect(0, 0, this.width, this.height);
        
        if (this.shake > 0) {
            ctx.save();
            ctx.translate(Math.random() * this.shake - this.shake/2, Math.random() * this.shake - this.shake/2);
        }

        drawRoad();
        updateParticles();
        
        if (this.active) {
            player.update();
            updateEnemies();
            updateCollectibles();
            this.update();
        }
        
        player.draw();

        if (this.shake > 0) ctx.restore();

        requestAnimationFrame(() => this.loop());
    }
};

/**
 * ENTITIES
 */
const player = {
    x: 0,
    y: 0,
    w: 40,
    h: 70,
    targetX: 0,
    vx: 0,
    nitro: false,
    color: '#00f2ff',

    update() {
        const speedMult = this.nitro ? 1.8 : 1;
        if (keys.ArrowLeft || touch.left) this.vx = -7;
        else if (keys.ArrowRight || touch.right) this.vx = 7;
        else this.vx *= 0.8;

        this.x += this.vx;

        // Constrain to road
        const padding = (game.width - game.roadWidth) / 2;
        if (this.x < padding + this.w/2) this.x = padding + this.w/2;
        if (this.x > game.width - padding - this.w/2) this.x = game.width - padding - this.w/2;

        if (this.nitro) {
            game.speed *= 1.05;
            createParticle(this.x, this.y + this.h, '#ff007f');
        }
    },

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(-this.w/2 + 5, 5, this.w, this.h);

        // Body
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        
        // Car Shape
        ctx.beginPath();
        ctx.roundRect(-this.w/2, -this.h/2, this.w, this.h, 8);
        ctx.fill();

        // Windshield
        ctx.fillStyle = '#111';
        ctx.fillRect(-this.w/2 + 5, -this.h/4, this.w - 10, 15);

        // Headlights
        ctx.fillStyle = '#fff';
        ctx.fillRect(-this.w/2 + 5, -this.h/2, 8, 4);
        ctx.fillRect(this.w/2 - 13, -this.h/2, 8, 4);

        if (this.nitro) {
            ctx.shadowColor = '#f4ea17';
            ctx.fillStyle = '#f4ea17';
            ctx.fillRect(-this.w/2 + 10, this.h/2 - 2, 5, 10);
            ctx.fillRect(this.w/2 - 15, this.h/2 - 2, 5, 10);
        }

        ctx.restore();
    }
};

let enemies = [];
function updateEnemies() {
    if (Math.random() < 0.02 * game.level) {
        const lanes = [game.width/2 - game.laneWidth, game.width/2, game.width/2 + game.laneWidth];
        enemies.push({
            x: lanes[Math.floor(Math.random()*lanes.length)],
            y: -100,
            w: 40,
            h: 70,
            speed: game.speed * (0.5 + Math.random() * 0.3),
            color: `hsl(${Math.random()*360}, 70%, 50%)`
        });
    }

    enemies.forEach((en, i) => {
        en.y += en.speed;
        
        // Drawing Enemy
        ctx.fillStyle = en.color;
        ctx.shadowBlur = 5;
        ctx.shadowColor = en.color;
        ctx.beginPath();
        ctx.roundRect(en.x - en.w/2, en.y - en.h/2, en.w, en.h, 5);
        ctx.fill();

        // Collision
        if (Math.abs(player.x - en.x) < 35 && Math.abs(player.y - en.y) < 65) {
            game.gameOver();
            for(let i=0; i<20; i++) createParticle(en.x, en.y, '#ff0000');
        }

        if (en.y > game.height + 100) enemies.splice(i, 1);
    });
}

let collectibles = [];
function updateCollectibles() {
    if (Math.random() < 0.01) {
        collectibles.push({
            x: (game.width - game.roadWidth/2) + Math.random() * game.roadWidth - (game.width/2), 
            y: -50,
            r: 10,
            rot: 0
        });
    }

    collectibles.forEach((c, i) => {
        c.y += game.speed;
        c.rot += 0.1;

        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(c.rot);
        ctx.fillStyle = '#f4ea17';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#f4ea17';
        ctx.beginPath();
        ctx.rect(-8, -8, 16, 16);
        ctx.fill();
        ctx.restore();

        // Collision
        if (Math.abs(player.x - c.x) < 30 && Math.abs(player.y - c.y) < 40) {
            game.coins++;
            playSound('coin');
            for(let i=0; i<8; i++) createParticle(c.x, c.y, '#f4ea17');
            collectibles.splice(i, 1);
        }

        if (c.y > game.height + 50) collectibles.splice(i, 1);
    });
}

/**
 * ENVIRONMENT
 */
let roadOffset = 0;
function drawRoad() {
    roadOffset += game.speed;
    const padding = (game.width - game.roadWidth) / 2;

    // Road Surface
    ctx.fillStyle = '#222';
    ctx.fillRect(padding, 0, game.roadWidth, game.height);

    // Side lines
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(padding, 0); ctx.lineTo(padding, game.height);
    ctx.moveTo(game.width - padding, 0); ctx.lineTo(game.width - padding, game.height);
    ctx.stroke();

    // Lane Dash
    ctx.setLineDash([40, 40]);
    ctx.lineDashOffset = -roadOffset;
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
    ctx.beginPath();
    ctx.moveTo(game.width/2 - game.laneWidth/2, 0);
    ctx.lineTo(game.width/2 - game.laneWidth/2, game.height);
    ctx.moveTo(game.width/2 + game.laneWidth/2, 0);
    ctx.lineTo(game.width/2 + game.laneWidth/2, game.height);
    ctx.stroke();
    ctx.setLineDash([]);
}

/**
 * PARTICLES
 */
let particles = [];
function createParticle(x, y, color) {
    particles.push({
        x, y,
        vx: Math.random() * 4 - 2,
        vy: Math.random() * 2 + 2,
        life: 1,
        color
    });
}

function updateParticles() {
    particles.forEach((p, i) => {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.02;
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 4, 4);
        if (p.life <= 0) particles.splice(i, 1);
    });
    ctx.globalAlpha = 1;
}

/**
 * INPUTS
 */
const keys = {};
const touch = { left: false, right: false };

window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space') { player.nitro = true; playSound('nitro'); }
});
window.addEventListener('keyup', e => {
    keys[e.code] = false;
    if (e.code === 'Space') player.nitro = false;
});

// Mobile button listeners
const btnL = document.getElementById('btn-left');
const btnR = document.getElementById('btn-right');
const btnN = document.getElementById('nitro-btn');

btnL.ontouchstart = (e) => { e.preventDefault(); touch.left = true; };
btnL.ontouchend = () => touch.left = false;
btnR.ontouchstart = (e) => { e.preventDefault(); touch.right = true; };
btnR.ontouchend = () => touch.right = false;
btnN.ontouchstart = (e) => { e.preventDefault(); player.nitro = true; playSound('nitro'); };
btnN.ontouchend = () => player.nitro = false;

// Boot game
game.init();

</script>
</body>
</html>
